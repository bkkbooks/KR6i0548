body:
  text: 蕅益沙門古吳智旭述夫三界惟心心外無法理具事造實非兩重但迷之則三障宛然悟之則三德法爾迷悟無性隨俗假名真實指歸二而不二不二而二迷悟似分迷既迷其所悟悟即悟其所迷此占察善惡業報經乃指迷歸悟之要津也占察者能觀之智善惡業報者所觀之境能觀無非一心三智所觀無非一境三諦消除疑障堅固淨信開示進趣方便安慰令離怯弱所以釋迦大聖勸當機而專請地藏慈尊乘悲願而演説事理雙明淺深同益可謂照昏衢之寶炬救痼疾之神丹雖復去聖時遙何幸妙詮猶在鑽仰既切欲罷不能蠡測管窺用公同志將疏經文先明玄義第一釋名第二顯體第三明宗第四辨用第五教相第一釋名者經題七字六別一通別七例中今單從法占察二字約能觀法善惡業報四字約所觀法釋此能所二法復有兩番初略次廣初略釋者占以瞻視為義察以詳審為義各有事理事者依於大士所示三種輪相至誠擲視名之為占審諦觀其相應與否名之為察或自除疑或除他疑但當學習此法不得隨逐世間卜筮法也理者依于大士所示一實境界二種觀道如實正向名之為占依於大士所示巧説深法離相違過諦審思惟名之為察由是自善進趣令他亦善進趣自離怯弱令他亦離怯弱是名理占察也善惡者十善十惡依身口意而名為業業秖是思由善惡思發身口意種種事業意兼惑業身口唯業今以第一輪相占視善惡多少察其相應與否復以第二輪相占視業力強弱亦須察其相應與否又以第三輪相占視三世果報亦須察其相應與否具如經文廣明自身所有善惡業報依此三種輪相而占察之決了疑悔為他亦然故名占察善惡業報也復次有善惡惑有善惡業有善惡業所感果報惑業果三皆是因緣所生凡屬因緣生法無不即空假中今依一實境界解了即空假中名之為占復依二種觀道證悟即空假中名之為察或依進趣方便知其即空假中啓迪正信名之為占復依巧説深法悟其即空假中永離怯弱名之為察故稱占察善惡業報也初略釋竟次廣釋者若依文便應先釋占察後釋善惡業報然設無善惡業報約何可論占察今依此義故先釋善惡業報後釋占察也先釋善惡業報復為二初分釋二合釋初中三初釋善惡二釋業三釋報初釋善惡為四初約事局釋二約理通釋三結屬十法界四結成即空假中初約事局釋者性是清淨調良能為此世他世順益名之為善性是染汙粗戾能為此世他世違損名之為惡即殺生偷盜邪淫名身三惡妄言綺語兩舌惡罵名口四惡貪欲瞋恚愚癡名意三惡不殺不盜不淫名身三善不妄不綺不離間不粗獷名口四善不貪不瞋不癡名意三善故四十二章經云如是十事不順聖道名十惡行是惡若止名十善行耳又十善各論止行不殺不盜等名為止善慈悲放生周給布施修習梵行説誠實言説利義語和合諍訟柔軟誘誨常念喜捨志存悲愍了達事理名為行善故此經云言十善者則為一切衆善根本能攝一切諸餘善法言十惡者亦為一切衆惡根本能攝一切諸餘惡法也初約事局釋竟二約理通釋者先釋惡次釋善後明互融先釋惡者有事惡有理惡事惡如前説理惡者外道計斷計常破壞因果是殺俗諦違背涅槃不能證契是殺真諦見戒二取心外著法是偷盜愛染見執及味禪等是邪淫實非出要自言出要是妄言種種戲論無真實義是綺語鬬亂出世間法是兩舌增長煩毒是惡口自謂真實是貪謂餘虗妄是瞋不知出要是癡聲聞緣覺永斷生因是殺俗諦不知佛性是殺中諦妄取涅槃是盜證偏真理不能捨離是淫未得一切解脫自謂解脫是妄言譬如空拳楊葉無真實義是綺語分離生死涅槃無二法性以為定二是兩舌分別善惡有漏無漏等法是惡口著無為是貪厭有為是瞋不知平等法性是癡權教菩薩入空時殺俗諦入假時殺中諦觀中時雙殺二諦誓取菩提是盜神通法愛是淫未證實相有所言説是妄言種種言説不契實義是綺語分別中邊是兩舌彈訶生死及二乘法是惡口似道法愛是貪捨離二邊是瞋未照圓中是癡釋惡竟次釋善者事善如前説理善者佛弟子離斷常見深信因果是不殺俗諦達一切法無我無我所亦無實性不殺真諦知一切法皆是佛法皆是實相第一義諦法界法住法位真如實際如來藏性平等圓融不可思議不殺中諦了知心外無法可取是不盜無能無所是不淫四悉因緣如理詮説是不妄能令衆生得於四益是不綺隨順事理是不鬬亂悅可衆心是不粗惡離似道愛是不貪不違三諦是不瞋了達三諦是不癡次釋善竟後明互融者善惡名字本無一定故以名定義萬無一得以義定名萬無一失且如約事則殺盜等為惡不殺盜等為善約理則有漏事善事惡總名為惡無漏事理乃名為善又有漏善惡及偏真事理總名為惡入假事理乃名為善又有漏善惡及偏真事理入假事理總名為惡入中事理乃名為善又但中事理仍名為惡圓中事理乃名為善是則事殺事盜等唯得名惡不得名善圓中事理唯得名善不得名惡若事不殺盜等乃至但中事理亦得名善亦得名惡望前則皆名善望後則皆名惡也復有理惡所謂弒無明父害貪愛母菩提無與者然我取菩提法喜為妻空拳誘度乃至大貪大瞋大癡法門是則惟佛具足十惡菩薩二乘但有少分十惡一切衆生唯能具足十善更無少惡也二約理通釋竟三結屬十法界者又為三初明十界二明四教三明六即初明十界者地獄苦重但具事理善惡種子不起事理善惡現行一分極苦鬼趣傍生亦爾鬼畜二趣亦具事理善惡種子多起事惡現行少起事善現行未必能起理惡理善慧力弱故阿修羅趣略同鬼畜或得見佛聞法能起理善理善若起如應攝入四聖界中人趣有二若在北洲雖具一切種子但起事善不起事惡亦復不起理惡理善就事善中但有舊醫十善不起三皈五戒八戒具戒諸善以不聞佛法故若在三洲具能起於事理善惡人中慧解極猛利故若起理善亦隨攝入四聖界中天趣有四一地居二天謂四王忉利具起事理善惡略與人同但事善中缺出家戒一事耳二空居四天謂夜摩兜率化樂他化不起殺盜邪淫三種事惡猶有正淫未斷亦容起後七種事惡亦能起事十善但不起出家戒亦能起於理善理惡若起理善亦隨攝入四聖界中三色界中又分為二一初禪天猶有覺觀語言容起口妄意貪梵於釋子起諂誑故不起其餘事惡得起一切理善理惡若起理善亦隨攝入四聖界中二禪以上已離覺觀不起身口事惡但起當地貪癡及起理善理惡若起理善屬四聖界也四無色界但有四蘊無業果身不起身口事善事惡亦起當地貪癡多起理惡少起理善一切菩薩不生彼故聲聞緣覺又分為三一者見道二者離欲三者無學初見道位永斷十種分別事惡亦斷外道殺俗殺真等理惡而未能斷正淫及貪瞋癡任運事惡亦復全起聲聞緣覺理惡二離欲位永斷欲界十種事惡未斷色無色界任運貪癡事惡三無學位又分為二一有餘依地永斷三界事惡全墮聲聞緣覺理惡二無餘依地若據權論即是永入涅槃無復事理善惡若現若種若據實論即是出生界外方便土中但斷界內事理善惡現種仍復現行聲聞緣覺理惡或能起于菩薩佛界理善理惡若起菩薩佛界善惡如應攝入菩薩佛界也菩薩法界復分為四一三藏所明事六度菩薩具足事理善惡種子而弘誓力強止觀力弱但能永斷事惡現行不能損害事惡種子但能熾然修行事善不能方便發起理善于本教中既不立修證地位尅實論之猶屬人天界耳二通教菩薩若在乾慧性地略同三藏若八人見地發真則永斷凡外事理二惡能起菩薩佛界事善及理善惡三別教菩薩十信位中亦同三藏十住已去同前通教或復勝之可以意得登地證道同圓永斷九界事理二惡唯起佛界事理二善及佛理惡四圓教菩薩亦名菩薩亦名為佛五品位中圓伏九界事理二惡圓起佛界事善而佛界理善理惡猶未現起十信位中任運先斷凡外事理二惡亦斷聲聞緣覺理惡相似起于佛界理善理惡初住已去圓斷九界事理二惡分證佛界理善理惡也佛界亦四一藏教所明果佛止能永斷六凡事理二惡種子圓滿無漏事理二善止能弒枝末無明父害界內貪愛母取一切智菩提以真諦法喜為妻説生生不可説法以誘嬰兒不捨三界有為福慧為大貪不取三界見思因果為大瞋不分別三界諸法為大癡耳二通教所明果佛因雖先斷六凡事理二惡種子至果滿時還與藏佛同也但兼能説生不生不可説法以誘嬰兒為小勝耳三別教所明妙覺果佛僅斷十二品無明惡僅分證圓中事理二善僅分證大貪大瞋等惡不得名究竟也四圓教所明妙覺果佛一切事理二惡斷無不盡一切事理二善修無不滿又究竟弒無明父究竟害貪愛母究竟取大菩提無有遺餘究竟會合三諦法喜無時暫捨生生等四句皆不可説而説四句一切實一切不實一切亦實亦不實一切非實非不實誑誘十界嬰兒不捨一切法不取一切法不分別一切法是謂究竟善究竟惡也初明十界竟二明四教者四教各論十界而淺深通別有異今應從淺辨深束通從別且如藏教以凡外事理二惡為所治以三乘四諦十二因緣六度為能治凡外是六法界四諦是聲聞界十二因緣是緣覺界六度是菩薩界三祇因滿得成正覺即是佛界而究其所詮止是因緣生法一句析法歸空斷除我執不知諸法當體即空為化鈍根施此小法若約菩薩不出六凡若約證真唯歸灰斷束通從別判是聲聞法也次明通教亦以凡外事理二惡為所治以共般若無生理觀為能治凡外是六法界已辦地是聲聞界辟支地是緣覺界第九地即菩薩界第十地即佛界而究其所詮止是即空一句體法無性斷界內我法二執不知諸法假名無量雖為大乘初門當教亦歸灰斷束通從別判是緣覺法也次明別教以九界事理二惡為所治以不共般若次第三觀為能治十信位中仰信中道用藏教析空觀及六度事善治凡外事理二惡十住用通教體空觀及六度理善斷凡外事理二惡十行用入假觀治聲聞緣覺理惡遍能通達十界病之與藥十向習中道觀治菩薩理惡十地斷九界理惡證佛界理善而究其所詮止是假名一句緣理斷九不知諸法當體即中雖云證道同圓當教談理不融束通從別判是菩薩法也次明圓教以十界事理二惡為所治即以十界事理二善為能治亦得云以十界理善為所治以十界理惡為能治亦得云十界善惡皆是所治十界善惡皆即能治何以故三千在理同名無明能治性外無別所治如水成冰故三千果成咸稱常樂所治性別無外能治如冰還成水故雖無能所而能所宛然以一心三觀圓治一切事惡理惡圓顯一切理善理惡始從五品終至妙覺所斷所顯略如前説而究其所詮明一切法皆是佛法因緣即中心佛衆生三無差別説無分別法隨佛自意語束通從別判是佛界法也二明四教竟三明六即者圓教既明衆生即佛性德平等若不了之易起僭慢故須以六位揀修修雖分六性恆平等故六而常即可祛退怯性雖平等修有逆順故即而常六可除上慢也理即惟逆究竟惟順名字以去望前名順望後名逆又逆性則順無明順性則逆無明故逆名為惡亦可名善順名為善亦可名惡也初理即者且如舉一善字即具十界由其順無明父孝貪愛母不敢盜取菩提乖離法喜妻妾不作佛法口業不貪事理二善不瞋見思煩惱分明起惑造業則為三塗法界乃至不殺中諦不取自心不著似愛不説不了義法不貪權善不瞋二邊了達三諦則為佛界又如舉一惡字亦具十界由其殺生偷盜等十惡滿足則墮三塗法界由其雖不起事惡而有迷真理惡則墮人天法界雖無事惡及迷真惡而有迷俗理惡則墮二乘法界雖無事惡及迷真迷俗理惡而有迷中理惡則墮菩薩法界雖無事惡迷三諦惡而具足弒無明父等惡則墮佛界是知善惡二名各具十界就一一界無不即空假中而六凡生盲日用不知二乘眇目妄生取捨菩薩隔羅謂在障外故從地獄至別十向終日在理不得理用皆名為理即佛亦名理即十界亦名理即善惡也二名字即者若聞圓頓妙詮能解一切善惡但有名字一切十界亦但名字一一名字即空假中一名字中通達一切名字一切名字通達秖一名字非一非一切而一切而一故為名字即佛亦為名字即十界亦為名字即善惡也三觀行即者依所解義而起如理作意審諦思惟十界善惡一一無非三德祕藏故能圓伏五住雖有煩惱如無煩惱雖有肉眼名為佛眼此是觀行即佛亦名觀行即十界觀行即善惡也四相似即者由圓觀力相似斷事理惡生事理善如鑽木火暖相先現如消堅冰漸令潤濕故名相似即佛亦名相似即十界相似即善惡也五分證即者由圓觀力分破十界善惡上之三惑分顯十界善惡上之三德如木出火還燒于木如冰成水還泮餘冰故名分證即佛亦名分證即十界亦名分證即善惡也六究竟即者圓道滿足惑無不破德無不顯如火出木盡如冰盡水澄故名究竟即佛亦名究竟即十界究竟即善惡以十界善惡本具三諦三德之理至此方得畢顯現故非別有法可證可得但全證得衆生所迷本理而已故云圓滿菩提歸無所得也三結屬十法界竟四結成即空假中者上來所明事理善惡該羅十界遍攝四教統括六即則若理若事若因若果能詮所詮性修藥病祗約善惡二字收無不盡是故若知善惡即空假中則知一切諸法無不即空假中圓融妙理觸處洞然復為三意一約豎結二約橫結三約一念非橫非豎總結一約豎結者事善事惡及凡夫理惡屬六凡法界為藏教所治墮理即位中者名世俗諦所謂因緣所生法也無漏事善證真理善屬二乘法界約藏通二教能治法門揀之則為圓教理即收之則同圓教相似即者名為真諦所謂我説即是空也入假事理二善屬菩薩法界約別教教道揀之亦為理即收之亦同相似者名世出世如幻俗諦所謂亦名為假名也入中事理二善及中道理惡屬佛法界約圓教圓詮始從名字終訖究竟者名為第一義諦所謂亦名中道義也二約橫結者四教所詮十界事理善惡一一無非因緣生法一一無不即空假中何以言之秖一法性法爾具足十界善惡諸法種子名之為因隨于迷悟染淨等緣造成十界善惡諸法差別既此十界善惡皆是因緣所生則自他共離四句簡責定皆無性無性故空空則無性不礙緣生一即一切互攝互具故名為假無性緣生緣生無性法法罔非全體法性法性之外更無他物泯絶內外空有對待故名為中也三約一念非橫非豎總結者上約豎結則三諦分屬十界次約橫結則十界各有三諦豎則為別橫則為並並別橫豎那顯至理今明秖依現前一念而辨善惡秖依一念事理善惡而分十界秖依十界而明四教秖依四教而辨六即一念理無先後那得名豎名別一念體無彼此那得名橫名並念體絶待強名為中一中則一切中若橫若豎無不即中中體離一切相強名為空一空則一切空若橫若豎無不即空中體具一切法強名為假一假則一切假若橫若豎無不即假經云衆生心體從本以來不生不滅自性清淨無障無礙猶如虗空離分別故此明一念心即中也又云平等普遍無所不至圓滿十方究竟一相無二無別不變不異無增無減此明一念心即空也又云以一切衆生心一切聲聞辟支佛心一切菩薩心一切諸佛心皆同不生不滅無染寂靜真如相故此明一念心即假也又云若無覺知能分別者則無十方三世一切境界差別之相此明一空一切空也又云以一切法皆不能自有但依妄心分別故有此明一假一切假也又云當知一切諸法悉名為心以義體不異為心所攝故此明一中一切中也是故若能了達現前一念心法則能遍達善惡十界四教六即皆非橫豎亦能遍照善惡十界四教六即若橫若豎可以意知不可言盡也初釋善惡竟二釋業亦為四初釋義二辨類三結屬十法界四結成即空假中初釋義者業名事業亦名所作亦名為動亦名構造若約小乘則但在意地不得業名動身發口乃名為業若約大乘則一念甫動便有業意經云衆生于日夜中念念造出種種五陰世間國土世間假名世間此之謂也二辨類者一惡業二善業又一有漏業二無漏業又四種分別一有漏業二無漏業三亦有漏亦無漏業四非有漏非無漏業一惡業者謂五逆十惡慳嫉毀禁散亂惡慧諸邪見業二善業者謂施戒禪慧等業又有漏業者謂十惡能招非福果報十善能招福樂果報四禪四定能招不動果報無漏業者出世聖人所修聖道不感三界異熟果報唯證清淨離繫妙果又無漏有二一者無為無漏即所證真如不名為業二者有為無漏即能證福智福名助道智名正道福德智慧皆名為業也四種分別者凡外善不善及不動業名為有漏二乘出生死業名為無漏菩薩度衆生業不取涅槃名亦有漏不染生死名亦無漏諸佛稱性妙業不同凡夫名非有漏不同二乘名非無漏或俗諦相應業名有漏真諦相應業名無漏中諦相應業約雙遮名非漏無漏約雙照名亦漏無漏也攝四入二者若約界內教意則有漏但攝有漏無漏具攝後三若約界外教意則有漏具攝前三無漏但攝第四若約別接通意則有漏及雙亦句總名有漏無漏及雙非句總名無漏也更以善惡展轉攝者或十惡為惡十善為善或散皆為惡定乃為善或有漏皆惡無漏為善或有漏無漏皆惡雙照為善或雙照仍名為惡雙遮泯同實相為善或雙遮不即諸法為惡雙照無非實相為善或一切皆名為惡一切皆名為善具如上文所明又此諸善惡業總分四類一順現受二順生受三順後受四不定受由其作時心有強軟境有高下及由已潤未潤已懺未懺種種不同故成四別也二辨類竟三結屬十法界者亦為三初明十界二明四教三明六即初明十界者不論名善名惡名漏無漏乃至非漏非無漏業但令念念之間計著我人專為名利益己損他不思反復身口意業純隨妄習不信三寶毀諸事戒錯誤因果殺害所尊是名地獄業道束為上品十惡若念念之間計著我人專恣情欲不知慚愧盲無所曉癡暗昏愚多諸怨結是名畜生業道束為中品十惡若念念之間計著我人慳貪嫉妬不知植福但積罪根是名餓鬼業道束為下品十惡若念念之間存諂誑心無質直意外施仁義內計我人種種所作情存勝負是名修羅業道束為下品十善若念念之間畏我墮苦節制五欲秉心歸戒希求後有是名人趣業道束為中品十善若念念之間願我未來恆受勝樂廣作衆福制止諸罪乃至攝散入禪訶色入空是名天趣業道束為上品十善若念念之間觀察三界苦空無常無我依四念處深信緣起永斷希求後有之心唯志寂滅無為之樂是名二乘業道束為無漏上品十善若念念之間緣于苦集二諦而起大悲緣于道滅二諦而起大慈深觀我法二空愍物昏迷種種方便令其覺悟遍十方界無有分劑盡未來時無有疲厭不求恩報不圖名稱不冀他知不見能所是名菩薩業道束為亦漏無漏上品十善若念念之間觀于諸法實相即權而實理事平等即實而權千如差別寂而常用萬行雲興用而常寂一際無際不作一想不作一切想而能了知一即一切一切即一微塵剎土不隔毫端十世古今不離當念身遍十方而無合散智入三世而無往來是名佛界業道束為非漏非無漏上上品十善亦名真中無漏上上品十善也二明四教者六凡善惡雖各三品由有虗妄我執同名有漏皆為藏教所治二乘無漏十善若析知無我則屬藏教若體知無我則屬通教菩薩亦漏無漏十善若緣生滅四諦而起慈悲則屬藏教名為有漏若緣無生四諦而起慈悲則屬通教名為無漏若緣無量四諦而起慈悲則屬別教名為亦漏無漏若緣無作四諦而起慈悲則屬圓教約雙遮論名為非漏無漏約雙照論亦可名為亦漏無漏也佛界非漏無漏上上品十善者正屬圓教以此圓解歷一切法令前三教乃至上品十惡亦成非漏無漏上上品善如一切草木無不具火一切堅冰無不即水故約義定名則偏名非漏非無漏善亦名真中無漏妙善若欲隨名立義則既可名上上品善亦可名上上品惡如所云弒無明父等又既可云無漏亦可云有漏以念念流出諸功德海無已時故既可云非漏無漏亦可云亦漏無漏以雙照漏與無漏一切法趣漏趣無漏故三明六即者既依圓實稱性而談一切諸法無非佛法上自佛界下極泥犁所有業性罔非實相狂慧不察濫聖招尤如暗中觸寶傷身失命故須約修辨六免墮重愆雖復六位始終歷然于業理性仍無增減故名為即也理即業性者秖是究竟業性楞伽經云如來藏是善不善因能遍興造一切趣生但迷者不自知耳知此業性為名字即觀此業性圓伏五住為觀行即粗垢先落六根清淨為相似即于此業性開發真明為分證即窮此業性罄無不盡為究竟即也三結屬十界竟四結成即空假中者亦為三意一約豎結二約橫結三約一念非橫非豎總結一約豎結者六界業道因緣所生結成世諦二乘業道因緣即空結成真諦菩薩業道假名無量結成俗諦佛界業道深達罪福實相結成中諦也二約橫結者十界業道一一無非因緣所生一一無不即空假中也三約一念結者祗就現前一念分別十界業道那得名豎十界業道唯一念心那得名橫不橫不豎橫豎歷然統一法性不可思議無非法性故即中不橫不豎故即空橫豎歷然重重無盡故即假也二釋業竟三釋報亦為四初釋義二辨類三結屬十界四結成即空假中初釋義者報是果報對因名果酬業名報則果即是報又約習因所感名為習果約報因所感名為報果則果屬了種報屬緣種又報義有二一約引業所感名為總報二約滿業所感名為別報總報名為真異熟果屬第八識別報名為異熟生果屬前六識一分無覆無記唯受苦樂不起業者當知總別二種皆名果報就此酬因所感果報心心所法見分屬心酬于習因屬了因種別名為果相分屬色酬于報因屬緣因種別名為報故法華云如是果如是報也又見分即如是性相分即如是相二分所依內自證分即如是體舉體成用用無別體故名不縱橫不並別也二辨類者十惡所招三塗果報一向是苦鬼畜二類或有微樂修羅人道苦樂相兼天道唯樂又約五受分別無間唯有苦受捨受一分極苦鬼畜亦爾有間得兼憂受或有微喜微樂鬼畜修羅人及欲天並具五受天與修羅戰時有憂苦故然北洲人不計我所無憂苦受初禪出離憂根二禪出離苦根三禪出離喜根唯有樂捨四禪出離樂根自此直至有頂唯有捨受此五皆是有漏受也二乘寂滅為樂出離五受以無所受名為正受亦名為無漏受菩薩不受二乘正受出假神通以為法樂名為亦漏亦無漏受示受生死故名亦漏不染生死過患故名亦無漏也諸佛不受一切諸受以無所受恆受中道稱性法樂名為非漏非無漏受不同四榮故非漏不同四枯故非無漏也攝四入二例如前説又不論五受漏與無漏四句分別總以苦樂二字判之收無不盡當知苦樂惟是自心分別實無心外法也何者阿鼻極苦舉世共知若住不可思議解脫菩薩大悲遊戲代衆生苦則以為樂故調達善知識云此中如第三禪豈實作逆罪者能得爾耶夫蛆蟲處廁宛轉出沒亦自謂樂蠅向臭飛蛾爭赴火狗噉糞穢皆自謂樂自人視之不勝其苦人間粗弊五塵昏迷沈醉諸天視之猶如糞廁欲天五塵展轉勝妙色界視之不啻鴆毒梵天身相光明炳然空界厭之謂如癰毒四空寂定自謂精微羅漢視之名為癡暗聲聞三昧無漏無為菩薩訶之名為敗種大士神通往來自在諸佛視之如童子戲故知九界衆生皆是以苦為樂所處愈下所樂愈劣自上視下知彼所樂當體是苦惟佛苦樂情盡證苦法界及樂法界惟一實相無苦無樂乃名大樂耳今姑就九界情謂則各以順適身心名為樂報違損身心名為苦報此苦樂報各從自類善惡業所招也二辨類竟三結屬十界亦復為三初明十界二明四教三明六即初明十界者地獄法界所有罪報純從上品十惡業招摧折粗惡色心為體重者在大地下輕者在諸黑暗山間惟苦無樂畜生法界罪報中品十惡業招餓鬼法界罪報下品十惡業招並以弊陋色心為體于中各有苦樂別報三品九類不同則是酬于滿業名異熟生事非一概不可具述住通山間人世水陸空界修羅法界報居大海受用似天為樂三時刀仗為苦人道法界報在四洲暫時五欲為樂生老病死為苦天道法界有三一者欲界二者色界三無色界欲界六天一四天王天或上品十善為因或一日一夜八關戒齋等為因或終身三歸精持一不殺戒為因報得殊勝色心居在須彌山腹二忉利天或上品十善為因或一日一夜八戒等為因或終身三歸精持不殺不盜二戒為因報得殊勝色心居在須彌山頂此二皆以五欲自在為樂修羅戰鬬及五衰相現為苦三夜摩天此云時分或上品十善兼習坐禪為因或一日一夜八戒等為因或終身三歸精持三戒為因報得殊勝色心離忉利天八萬由旬于虗空中有地如雲朗然安住不假日月身有光明華開為晝華合為夜四兜率天此云知足或上品十善兼得細住為因或一日一夜八戒等為因或終身三歸精持四戒為因報得殊勝色心離夜摩天十六萬由旬有地如雲空中安住五化樂天或上品十善兼得欲界禪定為因或一日一夜八戒為因報得殊勝色心離兜率天三十二萬由旬有地如雲空中安住六他化自在天或上品十善兼得未到地定為因或一日一夜八戒等為因報得殊勝色心離化樂天六十四萬由旬有地如雲空中安住此四亦皆以五欲自在展轉殊勝為樂五衰相現為苦色界共十八天分為四禪初禪三天一梵衆二梵輔三大梵同以根本初禪五支功德為因或以純孝為因或以深重慚愧為因或以深重慈心為因或以和合已破僧伽為因報得清淨色心離他化天一百二十八萬由旬有地如雲空中安住壽命盡一大劫或亦有中夭者離憂清淨為樂死時退墮為苦二禪三天一少光二無量光三光音同以根本二禪四支功德為因報得清淨色心離初禪天二百五十六萬由旬有地如雲空中安住壽命盡八大劫或亦有中夭者離苦清淨為樂死時退墮為苦三禪三天一少淨二無量淨三遍淨同以根本三禪五支功德為因報得清淨色心離二禪天五百一十二萬由旬有地如雲空中安住壽命六十四劫或亦有中夭者離喜妙樂為樂死時退墮為苦四禪九天又分三類一是凡夫二是外道三是不還聖者凡夫三天一福生二福愛三廣果同以根本四禪四支功德為因報得寂靜不動色心離三禪天一千二十四萬由旬隨身宮殿在虗空中朗然安住并無如雲之地故亦名無雲天壽命五百大劫或亦有中夭者捨念清淨為樂死時退墮為苦外道一天所謂無想即以無想定而為因報得寂靜不動色心生半劫後前六轉識悉皆不行唯第七第八兩識相依俱轉第八能持色身久住壽五百劫或有中夭死時決定退墮為苦不還五天一無煩二無熱三善見四善現五色究竟同以無漏夾熏四禪資于故業為因報得寂靜不動色心四禪凡夫所不能見壽或千劫乃至萬劫永無退墮為樂未離三界為苦無色界共有四天一空處天即以空定為因壽二萬劫二識處天即以識定為因壽四萬劫三無所有處天即以無所有定為因壽六萬劫四非想非非想處天即以非想非非想定為因壽八萬劫滅色存心但有微細受想行識亦有中夭同以出離色籠為樂死時退墮為苦也聲聞法界有四向四果初果以生空無漏智種為因聞思修慧熏習為緣發得生空無分別智頓斷三界分別惑種親證一分生空所顯真如名為擇滅無為是離繫果其身仍在人中天上當知此人天身猶是有漏故業餘報非無漏報也二果以重慮緣真為因漸斷欲界任運惑種九品之六親證六品擇滅無為其身亦在人中天上亦是有漏故業招報三果亦以重慮緣真為因斷盡欲界餘三品惑又證三品擇滅無為其身亦在人中天上亦是有漏故業招報若捨欲界身已報在初禪仍是有漏故業招報若斷初禪惑已報在二禪若斷二禪惑已報在三禪若斷三禪惑已報在四禪五不還天若斷四禪惑已報在空處若斷空處惑已報在識處若斷識處惑已報在無所有處若斷無所有處惑已報在非非想處齊此名為阿那含果皆是有漏故業招報非無漏業報也不論在人在天若能進斷非非想處九品思惑名羅漢向若已斷盡非非想思通證修道八十一品擇滅無為名羅漢果爾時名住有餘涅槃其身仍在人中天上此身亦是有漏故業餘報若人天身任運滅位不復更受三界生身爾時名住無餘涅槃若依權教則永無報果若依實説則三界外有淨土聲聞緣覺自謂入涅槃者出生其中受法性身非分段生當知即是方便有餘國土亦名三種意生身也總論苦樂者初果以永閉三惡道門為樂未斷欲愛為苦二果以欲習漸薄為樂未離欲繫為苦三果四向以永不退還為樂未離色無色繫為苦四果在有餘位以永斷子縛為樂未盡果縛為苦在無依位依權教説則是永無苦樂依實教説則超出三界為樂沈空滯寂為苦也緣覺法界不立分果而有二類一是緣覺種性四生百劫種福修因無漏根熟人中得道若遇佛世入聲聞數亦名緣覺遇無佛世名獨覺佛也二是聲聞初果第七生盡受人間身遇無佛世亦名獨覺也有餘無餘二種苦樂並同聲聞中説菩薩法界須約四教分別若三藏教菩薩總未斷惑但以四弘六度上上十善為因感得人天殊勝色心妙報不生三惡及無色界諸難處中若通教菩薩乾慧性地報同三藏菩薩八人見地薄地報同初果二果離欲地報同三果已辦地去或智增上者還同四果獨覺有餘無餘論報苦樂但彼生方便土亦不沈空滯寂秖是未證中道法性未免變易生死為苦耳或悲增上者扶習潤生還來三界示同六道果報苦樂而非實是有漏苦樂以其非業牽故若別教菩薩十信位中亦同三藏菩薩初住至第六住亦同初二三果七住已去乃至十向亦約智悲分別登初地時分證中道法身恆居實報無障礙土亦名分證常寂光土乃至等覺皆以中道果報為樂無明變易未盡為苦分形散影遍諸世界六趣四生及遍方便有餘土中示同六凡二聖種種苦樂皆非實苦樂也若圓教菩薩五品位中雖受人天報身已能解了苦樂實性即空假中初信至六信報或同于初二三果而解永異七信至十信或在方便報同通教智增而解永異或在同居報同通教悲增而解亦永異也登初住時分證如來一身無量身恆居實報莊嚴淨土亦名分證寂光淨土乃至等覺分形散影遍下三土示同九界苦樂皆非實苦樂也佛法界者約教有四藏教果佛必是別地圓住化身或是妙覺示現假説生身是有漏報乃是示同阿羅漢耳通教佛地示居色究竟天亦非三界實分段身必是別地圓住化現別教妙覺坐蓮華藏世界亦是大機隨力所見秖是他受用報托自受用而為本質諸大菩薩各自變為相分而自緣耳圓教妙覺性德究竟圓顯名為清淨法身所依法性名為上上品常寂光淨土修德究竟滿足名為圓滿報身所依報境名為上上品實報莊嚴淨土性修不二依正不二不二而二説有法報依正差別之名此是最勝無上報也初明十界竟二明四教者六凡法界有漏諸苦樂報但為四教所治並非四教所攝而是因緣生法得為藏教俗諦所詮亦得通為四教所觀之境方便土中無漏苦樂之報即是四教九人所感謂藏教四果辟支通教已辦辟支菩薩別教三賢圓教十信也實報無障礙土即是別教十地等妙圓教十住十行十向十地等覺所感雖亦分證寂光以理從事總名實報或約次第一心證入而分淨穢乃依教道假分別也常寂光土即是圓教妙覺所證雖亦圓證上品實報以事從理總名寂光或約分證究竟而分淨穢乃依別圓二種果頭而分別耳又藏教明六道果報是實有苦諦苦若滅者則證真空不説四聖亦有報也通教明六道果報是幻有苦諦若達幻空則無生死亦不説有四聖報也別教明六道果報是分段生死三乘果報是變易生死皆名苦諦永斷二死證真中道所證名為真如涅槃能證名為四智菩提大圓鏡智相應心品能現自受用身及土能持圓滿無漏種子盡未來際利樂有情此則説有四聖果報圓教明十界報法一苦一切苦而苦即法界則一滅一切滅乃是非報非不報而論十界報也二明四教竟三明六即者既依圓實稱性而談則十法界苦樂諸報一一無非實相法界即空假中誠恐狂惑無知執穢為淨安其陋習不求出離譬如指冰即水不求融泮水還是冰那可飲用故以六義而揀逆順如冰雖以濕為性而恆違濕性確爾堅凝理即位中亦復如是十界妙報不識不知昧為苦諦一苦一切苦也名字位中順修之始了知十界報法唯是一心譬如堅冰其實是水終不棄冰而別求水是為初識十界報法之名字也觀行位中依名觀察了知十界報法一一即空假中圓伏三惑如手執冰知其潤濕也相似位中深觀十界報法深信即空假中如冰近暖漸捨堅相也分證位中十界報法三諦理體分分現前如暖消冰分分融泮分分可飲用也究竟位中十界報法三諦妙理無不圓顯如冰已盡唯是一水盡可飲用也所以三千果成咸稱常樂廁屋實成香殿糞穢實成妙饌惡聲實成歌讚毒藥實成甘露刀箭實成華纓乃至我若向刀山刀山自摧折我若向火湯火湯自消滅等並是分證究竟位中真實受用不過還證衆生所迷報法之理體耳豈藉作意神通力哉三結屬十界竟四結成即空假中亦為三意一約豎結二約橫結三約一念非橫非豎總結一約豎結者六凡有漏諸苦樂報及有學無學諸餘殘報并同居土中新悟無生法忍菩薩所有生身亦是有漏故餘殘報並屬因緣生法一句世俗諦攝所以諸阿羅漢之十八界唯後三界名為無漏前十五界皆有漏也依此亦説藏頭果佛及十地諸大菩薩與羅漢同也兩教聲聞緣覺入涅槃界出生方便土中受變易身并通菩薩別三十心圓十信心生方便土所受變易五蘊十八界等並屬即空一句真諦所攝故稱無漏別地圓住捨分段身于實報土受果報身及悲願力于十方界種種同居方便兩土之中現十界像遍同苦樂而非實苦實樂乃至佛後得智應現實報方便同居三土遍示十法界像並屬即假一句妙俗諦攝故名亦漏亦無漏也圓教妙覺究竟圓證常寂光土三德祕藏微妙法身及別十地圓十住等分證三德寂光身土並屬即中一句中道第一義諦所攝故名非漏非無漏也二約橫結者不論有漏無漏苦之與樂若實若權但是十界所有依正二報一一無非因緣所生或是因緣所顯亦得名為因緣所生既是因緣生法則必法爾即空假中更無一色一心而不即空假中者也更細釋者同居依正二報是界內因緣所生有為有漏乃苦無常無我不淨之相然此苦等諸相無不即空假中方便依正二報非分段生是界內因緣所顯無為無漏乃苦無常無我不淨之性然此苦等諸性亦無不即空假中實報依正二報是界外因緣所生有為無漏乃常樂我淨之相然此常等之相亦無不即空假中寂光依正二報是界外因緣所顯無為無漏乃常樂我淨之性然此常等之性亦無不即空假中以體實故名之為中以離一切相故復名為空以即一切法故復名不空也若以寂光無為無漏望彼方便無為無漏則方便仍是有為有漏而已三約一念結者既秖就一念而辨善惡秖就一念而辨諸業則十界依正二報亦何出於現前一念一念本無前後那得名豎一念本無二體那得名橫深觀一念所具十界依正非橫非豎則能雙照橫之與豎了了分明而一一橫豎即非橫豎何者十界報法唯是一念則非橫非豎一空一切空不思議真諦也一念具十界報則非橫而橫一念造十界報則非豎而豎一假一切假不思議俗諦也離一念外別無所具所造十界報法可得離十界報法外別無能具能造一念可得唯是實相唯是法性心佛衆生三無差別非豎非不豎非橫非不橫離名絶相亦無名相而可離絶不思議中諦也三釋報竟上來初分釋善惡業報竟二合釋者復分為六初約十如釋二約十二因緣釋三約四諦釋四約二諦釋五約三諦釋六約一諦釋初約十如釋者善惡即如是性性以不改為義善是調良清淨為性不可改而為惡惡是粗戾染汙為性不可改而為善十界各有種性也業即如是相舉意動身發語有所表現十界事業覽而可別也性之與相同依色心色心即如是體也此善惡業各有力能各有構造即十界如是力如是作也善惡約性即十界如是因也業既約相即十界如是緣也報指十界色心依正即如是果如是報也性相為本果報為末一空一切空始終無性故為空等一假一切假始終相在覩本即能知末覩末即能識本故為假等一中一切中始終理同所謂實相實性乃至實果實報故為中等語不頓彰故空假中次第分別實不縱橫並別也法華經云唯佛與佛乃能究盡諸法實相所謂諸法如是相等此經云欲向大乘者應當先知最初所行根本之業所謂依止一實境界以修信解一實境界即是諸法實相故得約十如釋也二約十二因緣者復有四意一思議生滅因緣二思議不生滅因緣三不思議生滅因緣四不思議不生滅因緣今六凡善惡業報是思議因緣生相藏教二乘善惡業報是思議因緣滅相又六凡善惡業報即空是思議因緣不生相通教三乘善惡業報是思議因緣不滅相又九界善惡業報是不思議因緣生相佛界善惡業報是不思議因緣滅相又十界善惡業報無不即空假中是不思議因緣不生滅相何者善惡秖是無明愛取三支業秖是行有二支報秖是識名色六入觸受生老死七支惑即般若了因佛性業即解脫緣因佛性苦即法身正因佛性十二因緣名為佛性故不思議不生滅也三約四諦復有四意一生滅四諦二無生滅四諦三無量四諦四無作四諦今六凡有漏善惡業是生滅集諦六凡有漏依正報是生滅苦諦二乘無漏善業及菩薩有漏善業是生滅道諦二乘及三藏佛子果縛盡不受後有是生滅滅諦又六凡有漏善惡業即空是無生滅集諦六凡有漏依正報即空是無生滅苦諦此體空智及諸善業是無生滅道諦乃至涅槃亦如夢幻是無生滅滅諦又十界有漏無漏諸善惡業是無量集諦十界分段變易諸依正報是無量苦諦三止三觀十波羅蜜五行萬行亦漏無漏一切善業是無量道諦斷十重障證十真如是無量滅諦又十界善惡諸業不離一念是無作集諦十界依正諸報不離一念是無作苦諦達此一念心具心造是無作道諦諸法本來常寂滅相不復更滅是無作滅諦也四約二諦復有七意一藏教二諦實有為俗實有滅為真二通教二諦幻有為俗幻有即空為真三通含別二諦幻有為俗幻有即空不空為真四通含圓二諦幻有為俗幻有即空不空一切法趣空不空為真五別教二諦幻有幻有即空皆名為俗不有不空為真六別含圓二諦幻有幻有即空皆名為俗不有不空一切法趣不有不空為真七圓教二諦幻有幻有即空不有不空皆名為俗一切法趣有趣空趣不有不空為真今約藏教則六凡有漏善惡業報是實有俗諦此實有滅無復三界善惡業報乃會真諦若依通教則六凡有漏善惡業報是幻有俗諦此既如幻即不可得空名為真諦又六凡有漏善惡業報是幻有俗諦此俗即真依于真諦得論四聖無漏善業果報非復但空即是通含別也又六凡有漏善惡業報是幻有俗諦此俗即真此真即是中道不空之體具一切法是為通含圓也若依別教則六凡有漏善惡業報四聖無漏善業果報俱是俗諦中道理性非凡非聖為凡聖依非漏無漏為迷悟依乃名真諦又十界善惡業報俱是俗諦中道理性雖非凡聖及漏無漏而具一切凡聖漏無漏法名為真諦是為別含圓也若依圓教則六凡之有二乘之空菩薩佛之不有不空十界百界千如施設俱是俗諦秖此俗諦之中隨拈一法無非法界約有則一切法趣有百界千如之有即六凡有六凡善惡業報之有即百界千如之有亦即百界千如之空亦即百界千如之不有不空約空則一切法趣空百界千如之空即二乘空二乘灰斷之空即百界千如之空亦即百界千如之有亦即百界千如之不有不空約不有不空則一切法趣不有不空百界千如之不有不空即菩薩佛之不有不空菩薩佛中道善惡業報之不有不空即百界千如之不有不空亦即百界千如之有亦即百界千如之空宛轉相即無二無別不二而二説有二諦二而不二惟是一心心外無法千如宛然千如體真罔非實相理具事造無盡重重雖互遍融亦無所住是為不思議二諦也五約三諦復有五意一別入通三諦者約通含別二諦幻有為俗幻有即空不空為真今分此真諦以為兩諦空即是真不空即中諦也二圓入通三諦者約通含圓二諦幻有為俗幻有即空不空一切法趣空不空為真今亦分此真諦以為兩諦一切趣空是真一切趣不空是中也三別三諦者約別二諦幻有幻有即空皆名為俗不有不空為真今分彼俗諦以為兩諦幻有是俗幻有即空是真指彼真諦以為中道不有不空是中諦也四圓入別三諦者亦約別含圓二諦幻有幻有即空皆名為俗今仍分作真俗兩諦一切法趣不有不空為真今指此圓真以為圓中也五圓三諦者六凡之俗亦復即空假中具一切法二乘之真亦復即空假中具一切法菩薩佛之中道亦復即空假中具一切法三諦圓融不可思議即一而三即三而一非一非三而三而一也若別入通三諦則六凡幻有善惡業報是俗諦幻有即空是真諦此空不空本非煩惱生死亦非菩提涅槃而為煩惱菩提生死涅槃作所依持不斷不常不空不有是為中諦若圓入通三諦二諦同前此空不空具一切法是為中諦也若別三諦者六凡有漏善惡業報是俗四聖無漏唯善業報是真所依真如理性非有非空非漏無漏是中諦也若圓入別三諦者二諦同前理性具足一切諸法與前中異也若圓三諦者橫豎自在豎則六凡善惡業報之俗亦空假中二乘善惡業報之真亦空假中菩薩佛善惡業報之中亦空假中橫則十界俱空名為真諦此真即俗即中十界俱假名為俗諦此俗即中即真十界俱非空假名為中諦此中即真即俗秖是非橫非豎説橫豎耳六約一諦者大經云所言二諦其實是一方便説二如醉未吐見日月轉謂有轉日及不轉日醒人但見不轉不見于轉如是十界善惡業報皆由無明醉未吐故妄見法性隨緣流轉別立隨緣不變以為真如若佛眼觀無非實相實相之外更無餘法故此經名一實境界即指十界善惡業報當體唯一實諦即是常住妙明不動周圓妙真如性性真常中求于去來迷悟生死了無所得然隨情説則藏教以事外偏真為一實通教以即事而真為一實別教以真如不動為一實惟圓教以法法無非中道為一實也又既不見轉豈更對轉而説不轉若立不轉便是與轉為二若作二解便同醉人是故諸諦皆不可説言語道斷故若通作不可説者生生不可説則六凡善惡業報不可説也生不生不可説則二乘善惡業報不可説也不生生不可説則菩薩善惡業報不可説也不生不生不可説則佛界善惡業報不可説也上來先釋善惡業報竟後廣釋占察者善惡業報至理玄微非智莫顯故須占察約智占察略有二十差別一世智二五停心四念處外凡智三暖頂忍世第一內凡智四四果無漏智五支佛無漏智六六度菩薩緣事智七三藏佛果一切智八體法聲聞智九體法支佛智十體法菩薩入真方便智十一體法菩薩出假智十二通教佛地智十三別十信外凡智十四別住行向三十心內凡智十五別十地中道智十六別妙覺佛一切種智十七圓教五品外凡智十八圓教十信內凡智十九圓初住至等覺分證智二十圓妙覺佛究竟智一世智者心行理外邪計妄執不能占察善惡報不可信用故此經云不應棄捨如是之法而返隨逐世間卜筮種種占相吉凶等事貪著樂習若樂習者深障聖道也二五停四念外凡智者有定故言停有慧故言觀觀能翻邪定能制亂數息觀治散心不淨觀治貪心慈悲觀治瞋心因緣觀治邪見心念佛觀治障道罪故名五停心觀也觀身不淨觀受是苦觀心無常觀法無我是觀苦諦上四智治于四倒由此四觀令四倒不起初翻四倒未入聖理故言外凡智也此智能治六凡惡業而于業報因緣未能如實了知猶須依三輪相以自決疑三內凡智者緣四諦境得相似解能伏煩惱譬如鑽火暖相先現無漏智火所發前相名為暖位得色界定諦解分明如登山頂四望皆見名為頂位若能親近善友聞隨順法內心正觀信佛信法信僧信諦即住頂若不如是即頂退爾時設有疑悔亦須依輪占察若入下忍正觀欲界四諦色無色界四諦次入中忍唯觀欲界苦諦深生厭患次入上忍生世第一則能無間發真于聲聞乘決定不退不須輪相占察若欲為人占察未必有宿命天眼及他心智仍須輪相也四四果無漏智者初果八忍八智斷見惑永不復起三塗業報亦不復招北洲無想黃門二根盲聾瘖啞等報二果三果重慮緣真永斷欲界善有漏報四果永斷三界業報自無所占若欲為他占察或依神通道眼或借輪相以決凡愚亦無不可五支佛無漏智出無佛世未必用此輪相但用神通化他但能齊三界內齊爾所劫知彼善惡業報差別而不能知界外及無量劫前後諸事復不能知六道善惡業報即空況知即假中耶六六度菩薩緣事智者自發四弘已得決定不須占察初僧祇中未獲五通若欲為人宜用輪相二僧祇後五通自在不須輪相能決衆疑亦止能知六道因緣生滅相耳七三藏佛果一切智者本是別地圓住化現故能遍知三界內外曠劫前後一切業報因緣不用輪相而不説是即空假中八體法聲聞智者已具六通能知六道善惡業報亦知即空九體法支佛智者已侵習氣小勝聲聞十體法菩薩入真方便智者正達三界善惡業報一一即真十一體法菩薩出假智者正能分別六道三乘病之與藥善決六道一切疑網十二通佛智者亦是別地圓住化現故能遍知一切善惡業報不用輪相而説即空不説即假即中十三別十信外凡智者信有果頭真如實相為求此理起十信心自無疑網為他占察順依輪相十四別三十心內凡智者十住正習入空傍習假中十行正習假傍習中十回向正習中具足五通自無疑悔能決他疑遍知十界善惡業報而不能知一一即中十五別十地中道智者既證實相雙照二邊任運寂而常照初地一念照百世界二地一念照千世界等展轉增勝不可言盡十六別妙覺智者坐華藏界應法界機妙觀察智橫豎遍照下地不能測其邊際十七圓五品智者具縛凡夫能知如來祕密之藏雖有肉眼名為佛眼自無疑網不須輪相為他決疑亦須用之又自行種種三昧亦可依輪取決如永明大師已悟圓宗仍作坐禪萬善二當知拈一法出圓覺經與今輪相及灌頂神策經同名正法不比世間卜筮也十八圓十信內凡智者六根清淨任運能決大千疑網鑒十界機無有錯謬十九圓四十一分證智者初住妙智如初生月光明已自遍照無餘況復漸增至十四夜二十圓妙覺佛究竟智者譬如十五夜月體相俱圓法界洞明橫豎無餘豎則觀彼久遠猶若今日盡未來事授記不謬橫則恆沙界外一滴之雨尚知頭數松直棘曲鵠白烏玄皆了元由以要言之大圓鏡智無不頓印平等性智無不普入妙觀察智洞了因緣成所作智一時普應無分別非不分別無次第非不次第乃至十地所有智慧比如來智猶如閻浮提土比大千土不可思測不可形容是為究竟占察智也今地藏大士或是圓等覺智或是圓妙覺智本高迹下不可測知由與此土悲重緣深是故釋迦大聖令堅淨信請説此法能令博地凡夫依此頓除疑網而又廣明一實境界詳示二種觀道以為進趣方便又復巧説深法安慰羣迷真實相應無相違過則使名字初心遍能占察十界善惡業報若事若理罄無不盡法門之妙何以如此又復應知善惡業報即是境妙占察即是智妙以智契境而修二觀即是行妙成就信忍順忍及無生忍即是位妙信滿法故作佛解滿法故作佛證滿法故作佛一切功德行滿足故作佛亦是位妙及三法妙始終同住三德祕藏圓滿法故自住三德寂而常照有感必赴即感應妙又教衆生修行懺悔觀察法身以為能感若能至心所占則吉所求皆獲乃至能入一行三昧見佛無數皆感應妙我于爾時隨所應度而為現身或示神通種種變化或復令彼自憶宿命即神通妙或復隨其所樂為説種種深要之法乃至巧説深法令離怯弱即説法妙衆生聞法除疑生信即眷屬妙能獲深大利益漸次作佛即功德利益妙若識迹妙本妙非遙故佛歎云此善男子發心已來過無量無邊不可思議阿僧祇劫久已能度薩婆若海功德滿足但依本願自在力故權巧現化影應十方即是發迹顯本意也觀心十妙者現前一念具足十界善惡業報即境妙以圓三慧而占察之即智妙依此一實境界而修二觀即行妙信此自心順此自心了此自心本自無生即三忍位妙始終不離自心祕藏即三法妙境智和合即感應妙智能轉境即神通妙一念轉教餘心心所即説法妙餘心心所隨觀而轉即眷屬妙始從名字訖至究竟即功德利益妙也地藏大士及釋迦尊由觀心故久成十妙迹用廣遠我今觀心出此十妙亦當盡未來際迹用無窮即觀心本妙也釋別名竟次通名者梵語修多羅或修妬路或修單蘭或素怛秖是梵音輕重有云無翻含五義故亦云有翻一翻為經二翻為契三翻法本四翻為線五翻善語教含五翻五各具教行理三具如法華玄義茲不復述今但約一題以明通別占察是教善惡業是行報乃無記色心是理又占即是教察即是行善惡業報為所占察即是理以對經字任運有通別意也釋名竟第二顯體者體是主質乃名下之所詮經若無體則邪倒無印同于魔説故須顯一部之指歸明衆義之都會然此妙體非但會之至難亦乃説之不易經云如來法身非空非不空乃至無一切相不可依言説示法華云是法不可示言辭相寂滅大經云不生不生不可説又云有因緣故亦可得説此經亦云而據世諦幻化因緣假名法中相待相對則可方便顯示而説今略開七條一正顯經體二簡偽濫三一法異名四入體之門五遍為衆經體六遍為諸行體七遍為一切法體一正顯經體者即是一實境界也一切百界千如境界皆依一實虗妄顯現而彼境界別無自體惟以一實為體故名一實境界當知一實即諸法之實如冰水之濕性境界即諸法之權如濕性之冰水冰水雖別濕性無二境界雖別一實無殊故以一實境界為經正體猶法華所云諸法實相也法華開權顯實故收諸法之權而歸實相之實此經以實統權故舉一實之實而攝境界之權于十界中唯取佛界所照善惡業報之性此性不生不滅圓滿常住離一切相即一切法于十如中取如是體四因緣中取不思議不生不滅十二支中取苦即法身四四諦中但取無作于無作中唯取滅諦七二諦中取後五真諦五三諦中皆取中諦諸一實諦中取圓一實諦諸不可説中取不生不生不可説于二十智中取圓佛智於三忍中取無生忍於四佛中取功德行滿佛於三德中取法身德是故經云應當先知最初所行根本之業所謂依止一實境界以修信解若無一實境界以為依止如屋無空無所容受故釋論云若以無此空一切無所依為是義故須顯體也二簡偽濫者此一實境界不同凡外所計世間諸法不同邪禪所計空劫前事向上一著父母未生前面目威音王那畔又那畔不同小乘所證偏真不同別教所明清淨真如亦非但依圓詮名字可得分別惟依二種觀道能得色寂心寂二種三昧復入一行三昧乃住堅信決定信解耳三一法異名者或名法界法住法位法性真如實際本際實相如來藏性菴摩羅識唯識性自性清淨心本源心地正因佛性菩提涅槃不可思議解脫自覺聖智境界無戲論無顛倒圓成實性無漏界清淨法身大圓鏡智中實理心一切種智不共般若正遍知海大佛頂大方廣圓覺妙覺究竟覺等皆是一實境界異名但可意知不可言盡也四入體之門者一實境界其理淵奧如登絶壑必假飛梯欲契真源要因教行故以教行為門若以教為門教略有四於一一教各以四門詮理共有十六教門依一一門而修于觀復有十六行門於教得悟名為信行於觀得悟名為法行或教行相轉或教行相資茲不備論藏教四門通于一實遠而且拙須待開顯通教四門通于一實巧而仍遠亦須轉接別教四門通於一實雖近而拙圓教四門正通一實方為巧直也前三教各四門相茲亦不論略明圓教四門相者一門即一切門一切門即一門非一非四而論四一如經云如來法身中雖復無有言説境界離心想念非空非不空乃至無一切相不可依言説示亦可方便顯示而説以彼法身性實無分別離自相離他相無空無不空乃至遠離一切諸相故説彼法體為畢竟空無所有以離心分別想念則盡無一相而能自見自知為有是故空義決定真實相應不謬此即圓教空門相空即餘三不相違背也又云即彼空義中以離分別妄想心念故則盡畢竟無有一相而可空者以唯有真實故即為不空所謂離識想故無有一切虗偽之相畢竟常恆不變不異以更無一相可壞可滅離增減故又彼無分別實體之處從無始世來具無量功德自然之業成就相應不離不脫故説為不空此即圓教有門相有即餘三不相違背也又云如是實體功德之聚一切衆生雖復有之但為無明曀覆障故而不知見不能尅獲功德利益與無莫異説名未有此即圓教亦有亦空門相與餘三門不相違也又云一切諸法皆不離菩提體菩提體者非有非無乃至若有分別想者則為虗偽不名相應此即圓教非有非空門相與餘三門不相違也略示法行入門觀者如前所説四種門相即是不思議境上根觀境即能悟入如或未悟則應依境重發大菩提心如此妙境佛及衆生與我平等云何諸佛已悟我與衆生尚迷不覺不得受用哀傷哽慟而立四弘便可悟入如猶未悟勤修學習信奢摩他觀心及信毗婆舍那觀心則能豁然悟入如猶未悟仍以唯心識觀破一切法即空假中真如實觀不住見聞覺知永離一切分別之想則當悟入如猶未悟當自節節簡校通塞依彼大士巧説深法而離怯弱定可悟入如猶未悟勤修二觀觀于身受心法令知色心本寂即是圓四念處從此調適正勤如意根力覺道而入圓三脫門即是中根入道相也如猶未悟應于一切時一切處常勤誦念地藏菩薩名字當觀地藏法身及一切諸佛法身與己自身體性平等無二無別不生不滅常樂我淨功德圓滿是可歸依又復觀察己身心相無常苦無我不淨如幻如化是可厭離乃至上卷所示修懺悔法皆是對治助開之方便也又經云若人未得三業善相或見光明聞異好香夢佛菩薩放光作證則為虗妄誑惑詐偽及説三忍四佛差別之相皆令行人明識次位不生增上慢也又於虗妄誑惑詐偽之相令勿取著即是安忍不樂世間諸禪三昧亦復不樂二乘即離法愛也細簡經文十乘意足雖不次第幸可證明當知離十乘法別無入門觀矣五遍為衆經體者此一實境界乃千經萬論之所同詮華嚴非此則無以顯事事無礙法界阿含非此則無以顯寂滅涅槃方等非此則無以顯大乘法門般若非此則無以顯一切種智法華非此則無以顯一乘實相佛之知見涅槃非此則無以顯常住佛性三德祕藏是故一代時教若半若滿若權若實究竟皆以一實境界為體究竟皆是指歸一實境界而已六遍為諸行體者復有三意一泛論四教一十六門各有信法兩行皆依一實境界而得成就二別論依經立行不出四種所謂常行三昧常坐三昧半行半坐三昧非行非坐三昧也亦依一實境界以為其體可以意知三尅論今經又二初先明懺法供養禮拜悔罪勸請隨喜回向之後或端坐稱名或旋繞誦念則是非行非坐隨自意三昧所攝二別明二觀於一切時一切處隨身口意有所作業悉當觀察知唯是心等則是歷十二緣並可修行二觀亦不拘行坐也二種觀道正依一實境界以修信解離此別無行體不言可知修供養時即念一切三寶體常遍滿無所不在願令以此香華等同法性普熏一切諸佛剎土施作佛事乃至願共一切衆生修行如是供養已漸得成就六波羅蜜四無量心深知一切法本來寂靜無生無滅一味平等離念清淨畢竟圓滿豈非依一實境界而修供養行耶又一心敬禮擬心遍禮設非依一實境界何名一心何能遍禮耶又懺悔云如是罪性但從虗妄顛倒心起無有定實而可得者本唯空寂願一切衆生速達心本永滅罪根乃至願我所修一切功德資益一切諸衆生等同趣佛智至涅槃城豈非依一實境界而修五悔諸勝行耶又第三輪相云如此諸數皆從一數而起以一為本如是數相者顯示一切衆生六根之聚皆從如來藏自性清淨心一實境界而起依一實境界以之為本豈非依一實境界而示三種輪相法耶若不能知一實境界則諸行皆悉徒施是故經云若雜亂垢心雖復稱誦我之名字而不名為聞以不能生決定信解但獲世間善報不得廣大深妙利益如是雜亂垢心隨其所修一切諸善皆不能得深大利益當知未解一實境界皆名雜亂垢心若能解知一實境界則惟是一實無別境界故無雜亂自性清淨故無垢也從名字無雜亂垢乃至究竟無雜亂垢皆依一實境界而有進趣是故偏為諸行體也七遍為一切法體者經云依一實境界故有彼無明不了一法界謬念思惟現妄境界乃至生起六根六塵六識起違順等十八種受又云以一切法皆不能自有但依妄心分別故有又云當知一切諸法悉名為心以義體不異為心所攝故又云一切法畢竟無體本來常空實不生滅如是等文皆明一實境界遍為一切法體當知若所占察十界善惡業報若能占察二十智品差別一一皆以一實境界為體離此一實境界別無分毫能所可得能所皆是一實境界本非能所不必掃除能所方名無能所也以能所本不可得無可掃故譬如揑目妄見二月二月本無不可更滅但有一月真耳此體即是諸法之實可尊可貴此體窮盡諸法性相無不徹底此體遍能通達諸法無有障礙是故若識經體則識一切教體一切行體一切法體即識一切教行法之宗用以法身必具般若解脫故也二顯體竟第三明宗者前雖顯體但是理性理性平等含生共有雖復指冰即水不復他求欲得飲用仍須融泮又如雖有虗空必須梁柱綱紀一屋方得受用此屋若無棟宇終被風日雨露所侵一切衆生枉于法性空中受諸苦惱亦復如是故顯體之後即須明宗宗者修行之綱領會體之急務也提綱則衆目齊張挈領則襟袖畢至如湯消冰法性之水斯現如棟成屋祕藏之室可居今經以二種觀道為宗一者唯心識觀二者真如實觀唯心識觀者知唯妄念無實境界念亦生滅無暫時住從是當得色寂三昧真如實觀者思惟心性無生無滅不住見聞覺知永離一切分別之想展轉能入心寂三昧夫一實境界非色非心無明不了妄成二法猶如揑目妄見二月依于妄心分別妄色由于妄色顯示妄心故心與色為增上緣色亦與心為所緣緣若知色惟心現心外無色是為唯心識觀能得色寂三昧色寂則心亦寂矣若知心但有名本無生滅是為真如實觀能得心寂三昧心寂則色亦寂矣若知色心本寂則是觀行即佛從此習信奢摩他觀心及信毗婆舍那觀心止觀雙運能入一行三昧見佛無數發深廣行心住堅信位則是相似即佛乃至成就無生忍者則是分證即佛若除一切諸障無明夢盡則是究竟即佛是知始從名字終至究竟唯依一實境界而修二觀唯依二觀而證一實境界可謂一乘因果圓頓妙宗矣三明宗竟第四辨用者此經以滅罪除疑而為力用由迷一實境界起惑造業感得劣報由罪障故妄于報法而起疑惑由疑惑故不能依于二種觀道而滅幻罪今為末世鈍根先示三種輪相破壞衆生邪見疑網轉向正道到安隱處復示修行懺悔方法令其求得清淨輪相以為修習諸禪智慧之基次又廣明一實境界以開圓解正示二種觀道以勗圓行開解則疑無不除勗行則罪無不滅所以三忍可階四佛可作也又復善安慰説令離怯弱真實相應離相違過能令纖疑畢盡進趣可期可謂徹底慈悲勝妙方便救度末法沈淪令堅大乘淨信是此經之大力用也第五教相者此是大乘方等教攝引接三根令歸一實兼令無志求出要者亦能脫諸衰惱生于善處蓋是無法不備無機不收所謂亦攝漸機一切羣品而正意則唯在圓頓也教相竟
